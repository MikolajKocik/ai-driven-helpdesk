services:
  db:
    image: pgvector/pgvector:pg17
    container_name: adh-db-local
    environment:
      POSTGRES_DB: adh_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    container_name: adh-adminer-local
    restart: always
    ports:
      - "8081:8080"

  ollama:
    image: ollama/ollama
    container_name: adh-ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_local:/root/.ollama

volumes:
  postgres_data_local:
  ollama_data_local:
