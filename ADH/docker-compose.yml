services:
  db:
    image: pgvector/pgvector:pg17
    container_name: adh-db
    environment:
      POSTGRES_DB: adh_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - adh-network

  adminer:
    image: adminer
    container_name: adh-adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - adh-network

  ollama:
    image: ollama/ollama
    container_name: adh-ollama
    volumes:
      - ollama_data:/root/.ollama
    # Isolated network: Ollama is only accessible by the backend, no public internet access needed for local model
    networks:
      - ai-internal-network

  frontend:
    container_name: adh-frontend
    build: 
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    networks:
      - adh-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: adh-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=adh_db;Username=postgres;Password=password
      - Ollama__BaseUrl=http://ollama:11434
    depends_on:
      - db
      - ollama
    networks:
      - adh-network
      - ai-internal-network

networks:
  adh-network:
    driver: bridge
  ai-internal-network:
    # This network is isolated for backend-to-model communication
    internal: true

volumes:
  postgres_data:
  ollama_data: