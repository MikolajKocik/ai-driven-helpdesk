services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: adh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adh_user
      POSTGRES_PASSWORD: adh_password
      POSTGRES_DB: adh_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adh_user -d adh_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adh-network

  adminer:
    image: adminer:4
    container_name: adh-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adh-network

volumes:
  postgres_data:
    name: adh-postgres-data

networks:
  adh-network:
    name: adh-network
    driver: bridge