services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: adh_db
      POSTGRES_USER: adh_user
      POSTGRES_PASSWORD: adh_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=adh_db;Username=adh_user;Password=adh_password
      - AI__Endpoint=http://ollama:11434
    ports:
      - "5033:8080"
    depends_on:
      - db
      - ollama

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
